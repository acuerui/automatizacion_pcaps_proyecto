services:
  superset-db:
    image: postgres:16-alpine
    container_name: cits-superset-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SUPERSET_METADATA_DB:-superset}
      POSTGRES_USER: ${SUPERSET_METADATA_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_METADATA_PASSWORD:-change-me-local-metadata-password}
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  superset-redis:
    image: redis:7-alpine
    container_name: cits-superset-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  superset-init:
    build:
      context: .
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:latest}
    image: cits-superset-local:${SUPERSET_TAG:-latest}
    container_name: cits-superset-init
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-for-local-only}
      SUPERSET_METADATA_DB: ${SUPERSET_METADATA_DB:-superset}
      SUPERSET_METADATA_USER: ${SUPERSET_METADATA_USER:-superset}
      SUPERSET_METADATA_PASSWORD: ${SUPERSET_METADATA_PASSWORD:-change-me-local-metadata-password}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME:-CITS}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME:-Admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-change-me-local-admin-password}
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      /bin/sh -c "
      superset db upgrade &&
      (superset fab create-admin --username \"$${SUPERSET_ADMIN_USERNAME}\" --firstname \"$${SUPERSET_ADMIN_FIRSTNAME}\" --lastname \"$${SUPERSET_ADMIN_LASTNAME}\" --email \"$${SUPERSET_ADMIN_EMAIL}\" --password \"$${SUPERSET_ADMIN_PASSWORD}\" || true) &&
      superset init
      "
    restart: "no"

  superset:
    image: cits-superset-local:${SUPERSET_TAG:-latest}
    container_name: cits-superset
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-for-local-only}
      SUPERSET_METADATA_DB: ${SUPERSET_METADATA_DB:-superset}
      SUPERSET_METADATA_USER: ${SUPERSET_METADATA_USER:-superset}
      SUPERSET_METADATA_PASSWORD: ${SUPERSET_METADATA_PASSWORD:-change-me-local-metadata-password}
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      /bin/sh -c "
      superset run -h 0.0.0.0 -p 8088 --with-threads
      "

volumes:
  superset-db-data:
